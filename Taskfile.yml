version: "3"

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  switch:
    desc: Apply Home Manager configuration
    cmds:
      - home-manager switch --flake ./home-manager#$USER

  check-duplicates:
    desc: Check for packages duplicated between Homebrew and Home Manager
    cmds:
      - ./scripts/check-duplicates.sh
